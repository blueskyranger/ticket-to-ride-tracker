<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season Map — 3 Players</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    /* ---- Theme: Warm Parchment ---- */
    :root {
      --accent:    #7a5018;
      --border:    #c8a870;
      --card-bg:   #f5eedc;
      --page-bg:   #f0ece0;
      --sub:       #9a7040;
      --strip-bg:  #eee5cc;
      --map-inner: #ede0c4;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: var(--page-bg);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 1.25rem 1rem 3rem;
    }

    /* ---- Page header ---- */
    .page-header {
      display: grid;
      grid-template-columns: auto 1fr auto;
      align-items: center;
      width: 100%;
      max-width: 720px;
      margin-bottom: 1rem;
      gap: 0.5rem;
    }

    .back-link {
      font-size: 13px;
      color: var(--sub);
      text-decoration: none;
      white-space: nowrap;
    }
    .back-link:hover { color: var(--accent); }

    .page-title {
      font-family: 'Playfair Display', serif;
      font-size: 22px;
      letter-spacing: 2px;
      color: #2a1e08;
      text-align: center;
    }

    .page-badge {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sub);
      text-align: right;
      white-space: nowrap;
    }

    /* ---- Colour picker bar ---- */
    .setup-bar {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      justify-content: center;
      padding: 0.75rem 1rem 0.85rem;
      background: var(--card-bg);
      border-radius: 10px;
      border: 1px solid var(--border);
      margin-bottom: 1rem;
      width: 100%;
      max-width: 720px;
    }

    .setup-label {
      width: 100%;
      text-align: center;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--sub);
      margin-bottom: 0.3rem;
    }

    /* One row per player */
    .player-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.4rem 0.75rem;
      border-radius: 6px;
      background: rgba(255,255,255,0.35);
    }

    .player-name {
      font-family: 'Playfair Display', serif;
      font-size: 14px;
      font-weight: 700;
      min-width: 64px;
      transition: color 0.2s;
    }

    .swatches { display: flex; gap: 5px; }

    .swatch {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      border: 2.5px solid transparent;
      cursor: pointer;
      padding: 0;
      transition: transform 0.15s, border-color 0.15s, opacity 0.15s;
    }
    .swatch:hover:not(:disabled) { transform: scale(1.2); }

    /* White inner ring + dark outer glow = currently selected */
    .swatch.selected {
      border-color: #fff;
      box-shadow: 0 0 0 2px #333;
      transform: scale(1.15);
    }

    /* Faded = already taken by another player */
    .swatch.taken {
      opacity: 0.2;
      cursor: not-allowed;
    }

    /* ---- Map shell ---- */
    .map-shell {
      background: var(--card-bg);
      border-radius: 12px;
      padding: 1.25rem;
      width: 100%;
      max-width: 720px;
    }

    .map-hdr { text-align: center; margin-bottom: 0.75rem; }

    .map-hdr-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      letter-spacing: 2px;
      color: var(--accent);
    }

    .map-hdr-sub {
      font-size: 10px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--sub);
      margin-top: 3px;
    }

    .map-rule {
      border: none;
      border-top: 1px solid var(--border);
      margin: 5px auto;
      width: 220px;
    }

    .map-canvas {
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--map-inner);
    }

    /* ---- Score strip ---- */
    .score-strip {
      display: flex;
      margin-top: 0.75rem;
      border-radius: 8px;
      border: 1px solid var(--border);
      background: var(--strip-bg);
      overflow: hidden;
    }

    .score-cell {
      flex: 1;
      padding: 8px 6px;
      text-align: center;
      border-right: 1px solid var(--border);
    }
    .score-cell:last-child { border-right: none; }

    .sc-name {
      font-family: 'Playfair Display', serif;
      font-size: 12px;
      display: block;
    }
    .sc-pts {
      font-size: 16px;
      font-weight: 500;
      line-height: 1.1;
      display: block;
    }
    .sc-goal {
      font-size: 9px;
      letter-spacing: 0.5px;
      color: var(--sub);
      display: block;
    }
  </style>
</head>
<body>

  <div class="page-header">
    <a href="index.html" class="back-link">← Back to Scoreboard</a>
    <h1 class="page-title">Cape Town &rarr; Cairo</h1>
    <span class="page-badge">3 Players</span>
  </div>

  <!-- Colour picker rows are built by JavaScript -->
  <div class="setup-bar" id="setup-bar">
    <p class="setup-label">Choose your colour</p>
  </div>

  <div class="map-shell">
    <div class="map-hdr">
      <hr class="map-rule" />
      <p class="map-hdr-title">The Eastern Route</p>
      <p class="map-hdr-sub">3 Players &mdash; Parchment Edition</p>
      <hr class="map-rule" />
    </div>
    <div class="map-canvas">
      <svg id="map-svg" width="100%" viewBox="0 0 640 560" style="display:block;"></svg>
    </div>
    <div class="score-strip" id="score-strip"></div>
  </div>

  <script src="map-shared.js"></script>
  <script>
    // =====================================================
    // 3-PLAYER MAP CONFIG
    // =====================================================
    (async function () {
      var mod      = await import('./map-firebase.js');
      var groupKey = new URLSearchParams(window.location.search).get('group');
      var raw      = await mod.fetchMapData(groupKey).catch(function() { return null; });

      var THEME = {
        mapBg:       '#ede0c4',
        trackColour: '#b09840',
        cityStroke:  '#c8a870',
        termColour:  '#7a5018',
      };

      var GOAL     = raw ? raw.goal : 1000;
      var players  = (raw && raw.players.length >= 3) ? raw.players.slice(0, 3) : [
        { name: 'Player 1', pts: 0 },
        { name: 'Player 2', pts: 0 },
        { name: 'Player 3', pts: 0 },
      ];

      // Default colour order: Red, Blue, Green
      var assignments     = players.map(function(_, i) { return i; });
      var currentRoutes   = pickRoutes(3);

      function selectColour(pi, ci) {
        // If another player already has this colour, swap them
        var prev = assignments.indexOf(ci);
        if (prev !== -1 && prev !== pi) assignments[prev] = assignments[pi];
        assignments[pi] = ci;
        updateSwatches();
        renderMap();
      }

      function updateSwatches() {
        document.querySelectorAll('.player-row').forEach(function(row, pi) {
          row.querySelector('.player-name').style.color = COLOUR_OPTIONS[assignments[pi]].hex;
          row.querySelectorAll('.swatch').forEach(function(btn, ci) {
            btn.classList.toggle('selected', assignments[pi] === ci);
            btn.classList.remove('taken');
            btn.disabled = false;
          });
        });
      }

      function renderMap() {
        var mapped = players.map(function(p, pi) {
          return { name: p.name, pts: p.pts, colour: COLOUR_OPTIONS[assignments[pi]].hex };
        });
        drawMap('map-svg', 'score-strip', mapped, currentRoutes, GOAL,
          THEME.mapBg, THEME.trackColour, THEME.cityStroke, THEME.termColour, OFFSETS_3);
      }

      function buildPicker() {
        var bar = document.getElementById('setup-bar');
        players.forEach(function(p, pi) {
          var row = document.createElement('div');
          row.className = 'player-row';

          var nameSpan = document.createElement('span');
          nameSpan.className = 'player-name';
          nameSpan.textContent = p.name;
          row.appendChild(nameSpan);

          var swatchDiv = document.createElement('div');
          swatchDiv.className = 'swatches';
          COLOUR_OPTIONS.forEach(function(col, ci) {
            var btn = document.createElement('button');
            btn.className = 'swatch';
            btn.style.background = col.hex;
            btn.title = col.label;
            (function(pi, ci) { btn.onclick = function() { selectColour(pi, ci); }; })(pi, ci);
            swatchDiv.appendChild(btn);
          });

          row.appendChild(swatchDiv);
          bar.appendChild(row);
        });
      }

      buildPicker();
      updateSwatches();
      renderMap();
    })();
  </script>
</body>
</html>
