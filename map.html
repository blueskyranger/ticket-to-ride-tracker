<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Map — Ticket to Ride Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: #1b2a4a;
            font-family: 'Lato', sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Thin header bar */
        .map-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0.6rem 1.25rem;
            background: #1b2a4a;
            border-bottom: 3px solid #d4a017;
            flex-shrink: 0;
        }

        .back-link {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.12em;
            color: #d4a017;
            text-decoration: none;
            text-transform: uppercase;
        }
        .back-link:hover { color: #fff; }

        .map-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.2rem;
            color: #d4a017;
            text-align: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.5);
        }

        /* Group selector on the right */
        .group-select {
            display: flex;
            align-items: center;
            justify-content: flex-end;
            gap: 0.5rem;
        }

        .group-select label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: rgba(255,248,231,0.7);
            white-space: nowrap;
        }

        .group-select select {
            padding: 0.3rem 0.6rem;
            border: 1px solid #d4a017;
            border-radius: 4px;
            background: #2c3e68;
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            color: #fff8e7;
            cursor: pointer;
            max-width: 220px;
        }

        /* SVG map fills remaining space */
        #map-wrapper {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            padding: 0.5rem;
        }

        #track-svg {
            width: 100%;
            height: 100%;
            max-width: 100%;
        }

        .map-message {
            font-family: 'Oswald', sans-serif;
            font-size: 1.2rem;
            letter-spacing: 0.1em;
            color: #d4a017;
        }
    </style>
</head>
<body>

    <header class="map-header">
        <a href="index.html" class="back-link">← Scoreboard</a>
        <h1>Season Route Map</h1>
        <div class="group-select" id="group-bar" style="visibility:hidden">
            <label for="group-selector">Group:</label>
            <select id="group-selector" onchange="selectGroup(this.value)"></select>
        </div>
    </header>

    <div id="map-wrapper">
        <div class="map-message">🚂 Loading map...</div>
    </div>

    <script type="module" src="map.js"></script>

</body>
</html>
