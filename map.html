<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season Map — Ticket to Ride Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0ece0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: #2a1e08;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9a7040;
      text-align: center;
      margin-bottom: 3rem;
    }

    .prompt {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: #5a3a10;
      text-align: center;
      margin-bottom: 1.25rem;
      letter-spacing: 1px;
    }

    .group-btns {
      display: flex;
      flex-direction: column;
      gap: 0.85rem;
      margin-bottom: 3rem;
      width: 100%;
      max-width: 380px;
    }

    /* Fallback player-count buttons (shown if no games exist yet) */
    .player-btns {
      display: flex;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .player-btn {
      display: block;
      padding: 1rem 2.25rem;
      border-radius: 10px;
      background: #7a5018;
      color: #f5eedc;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      text-decoration: none;
      letter-spacing: 1px;
      border: 2px solid #9a6030;
      transition: background 0.18s, transform 0.1s;
      text-align: center;
    }
    .player-btn:hover {
      background: #5a3010;
      transform: translateY(-2px);
    }

    .group-btn {
      display: block;
      padding: 0.9rem 1.5rem;
      border-radius: 10px;
      background: #7a5018;
      color: #f5eedc;
      font-family: 'Playfair Display', serif;
      font-size: 16px;
      text-decoration: none;
      letter-spacing: 0.5px;
      border: 2px solid #9a6030;
      transition: background 0.18s, transform 0.1s;
      text-align: center;
    }
    .group-btn:hover {
      background: #5a3010;
      transform: translateY(-2px);
    }

    .group-btn-sub {
      display: block;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #d4a87a;
      margin-top: 3px;
    }

    .back-link {
      font-size: 13px;
      color: #9a7040;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .back-link:hover { color: #5a3010; }
  </style>
</head>
<body>

  <h1>Cape Town &rarr; Cairo</h1>
  <p class="subtitle">Season Progress Map</p>

  <p class="prompt" id="loading-msg">Loading season data…</p>

  <!-- Group selection — shown when there are active groups in the current season -->
  <div id="group-picker" style="display:none">
    <p class="prompt">Choose your group</p>
    <div class="group-btns" id="group-btns"></div>
  </div>

  <!-- Fallback — shown if no games have been recorded yet -->
  <div id="manual-picker" style="display:none">
    <p class="prompt">How many players?</p>
    <div class="player-btns">
      <a href="map-3.html" class="player-btn">3 Players</a>
      <a href="map-4.html" class="player-btn">4 Players</a>
      <a href="map-5.html" class="player-btn">5 Players</a>
    </div>
  </div>

  <a href="index.html" class="back-link">← Back to Scoreboard</a>

  <script>
    (async function () {
      var loadingEl = document.getElementById('loading-msg');
      var groupEl   = document.getElementById('group-picker');
      var manualEl  = document.getElementById('manual-picker');

      function showManual() {
        loadingEl.style.display = 'none';
        manualEl.style.display  = '';
      }

      try {
        var mod    = await import('./map-firebase.js');
        var result = await mod.fetchGroups();
        var groups = result.groups || [];

        // Filter to only groups the map pages support (3–5 players)
        groups = groups.filter(function(g) { return g.players.length >= 3 && g.players.length <= 5; });

        if (groups.length === 0) {
          showManual();
        } else if (groups.length === 1) {
          // Only one group — go straight to its map
          var g = groups[0];
          window.location.replace('map-' + g.players.length + '.html?group=' + encodeURIComponent(g.groupKey));
        } else {
          // Multiple groups — show selection
          loadingEl.style.display = 'none';
          groupEl.style.display   = '';
          var container = document.getElementById('group-btns');
          groups.forEach(function(g) {
            var a = document.createElement('a');
            a.className = 'group-btn';
            a.href = 'map-' + g.players.length + '.html?group=' + encodeURIComponent(g.groupKey);
            a.innerHTML =
              g.players.join('  ·  ') +
              '<span class="group-btn-sub">' + g.gameCount + ' game' + (g.gameCount !== 1 ? 's' : '') + '</span>';
            container.appendChild(a);
          });
        }
      } catch (e) {
        showManual();
      }
    })();
  </script>

</body>
</html>
