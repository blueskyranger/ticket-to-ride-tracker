<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Train Map — Ticket to Ride Tracker</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Oswald:wght@400;600&family=Lato:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --cream:     #fff8e7;
            --red:       #c0392b;
            --red-dark:  #8b1a1a;
            --navy:      #1b2a4a;
            --gold:      #d4a017;
            --text-dark: #2c1810;
            --text-mid:  #5c3d2e;
            --white:     #ffffff;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: 'Lato', sans-serif;
            background: var(--cream);
            color: var(--text-dark);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* --- Header --- */
        .map-header {
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            padding: 0.875rem 1.25rem;
            background: var(--navy);
            box-shadow: 0 3px 8px rgba(0,0,0,0.3);
        }

        .back-link {
            font-family: 'Oswald', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            color: var(--gold);
            text-decoration: none;
            text-transform: uppercase;
        }
        .back-link:hover { color: #fff; }

        .map-header h1 {
            font-family: 'Playfair Display', serif;
            font-size: 1.3rem;
            color: var(--gold);
            text-align: center;
            text-shadow: 1px 1px 0 rgba(0,0,0,0.4);
        }

        /* --- Decorative track strip --- */
        .track-strip {
            height: 12px;
            background: var(--red);
            background-image: repeating-linear-gradient(
                90deg, transparent, transparent 18px,
                rgba(0,0,0,0.25) 18px, rgba(0,0,0,0.25) 22px
            );
        }

        /* --- Group selector bar --- */
        .group-bar {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.75rem 1.25rem;
            background: var(--white);
            border-bottom: 2px solid var(--navy);
        }

        .group-bar label {
            font-family: 'Oswald', sans-serif;
            font-size: 0.82rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--navy);
            white-space: nowrap;
        }

        .group-bar select {
            flex: 1;
            padding: 0.45rem 0.75rem;
            border: 2px solid var(--navy);
            border-radius: 6px;
            background: var(--cream);
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: var(--text-dark);
            cursor: pointer;
        }
        .group-bar select:focus { outline: none; border-color: var(--red); }

        /* --- Map area --- */
        #map-wrapper {
            flex: 1;
            display: flex;
            justify-content: center;
            padding: 1rem 0.5rem;
            overflow-x: hidden;
        }

        #track-svg {
            width: 100%;
            max-width: 420px;
            height: auto;
            overflow: visible;
        }

        /* --- Loading / error states --- */
        .map-message {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            padding: 3rem;
            font-family: 'Oswald', sans-serif;
            font-size: 1rem;
            letter-spacing: 0.05em;
            color: var(--text-mid);
        }

        /* --- Score strip below map --- */
        #score-strip {
            background: var(--navy);
            padding: 0.75rem 1.25rem;
        }

        .score-strip-row {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.35rem 0;
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .score-strip-row:last-child { border-bottom: none; }

        .strip-swatch {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            flex-shrink: 0;
            border: 2px solid rgba(255,255,255,0.4);
        }

        .strip-name {
            font-family: 'Oswald', sans-serif;
            font-size: 0.9rem;
            color: var(--cream);
            flex: 1;
        }

        .strip-score {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            color: var(--gold);
            font-weight: 700;
        }

        .strip-pct {
            font-family: 'Lato', sans-serif;
            font-size: 0.78rem;
            color: rgba(255,255,255,0.5);
            min-width: 36px;
            text-align: right;
        }

        /* --- Footer --- */
        .app-footer {
            background: var(--navy);
            color: var(--gold);
            text-align: center;
            padding: 0.65rem;
            font-family: 'Oswald', sans-serif;
            font-size: 0.78rem;
            letter-spacing: 0.15em;
            border-top: 1px solid rgba(255,255,255,0.1);
        }

        /* --- iPad --- */
        @media (min-width: 600px) {
            .map-header h1 { font-size: 1.6rem; }
        }
    </style>
</head>
<body>

    <header class="map-header">
        <a href="index.html" class="back-link">← Scoreboard</a>
        <h1>Train Map</h1>
        <div></div>
    </header>

    <div class="track-strip"></div>

    <!-- Group selector — hidden until data loads -->
    <div class="group-bar" id="group-bar" style="display:none;">
        <label for="group-selector">Group:</label>
        <select id="group-selector" onchange="selectGroup(this.value)"></select>
    </div>

    <!-- SVG map rendered here -->
    <div id="map-wrapper">
        <div class="map-message">🚂 Loading map...</div>
    </div>

    <!-- Quick score reference below the map -->
    <div id="score-strip"></div>

    <footer class="app-footer">All aboard the scoreboard! 🛤️</footer>

    <script type="module" src="map.js"></script>

</body>
</html>
