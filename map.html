<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Season Map — Ticket to Ride Tracker</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: sans-serif;
      background: #f0ece0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
      gap: 0;
    }

    h1 {
      font-family: 'Playfair Display', serif;
      font-size: 30px;
      letter-spacing: 2px;
      color: #2a1e08;
      text-align: center;
      margin-bottom: 6px;
    }

    .subtitle {
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: #9a7040;
      text-align: center;
      margin-bottom: 3rem;
    }

    .prompt {
      font-family: 'Playfair Display', serif;
      font-size: 15px;
      color: #5a3a10;
      text-align: center;
      margin-bottom: 1.25rem;
      letter-spacing: 1px;
    }

    /* The three player-count buttons */
    .player-btns {
      display: flex;
      gap: 1rem;
      margin-bottom: 3rem;
      flex-wrap: wrap;
      justify-content: center;
    }

    .player-btn {
      display: block;
      padding: 1rem 2.25rem;
      border-radius: 10px;
      background: #7a5018;
      color: #f5eedc;
      font-family: 'Playfair Display', serif;
      font-size: 18px;
      text-decoration: none;
      letter-spacing: 1px;
      border: 2px solid #9a6030;
      transition: background 0.18s, transform 0.1s;
    }

    .player-btn:hover {
      background: #5a3010;
      transform: translateY(-2px);
    }

    .back-link {
      font-size: 13px;
      color: #9a7040;
      text-decoration: none;
      letter-spacing: 1px;
    }
    .back-link:hover { color: #5a3010; }
  </style>
</head>
<body>

  <h1>Cape Town &rarr; Cairo</h1>
  <p class="subtitle">Season Progress Map</p>

  <p class="prompt">How many players?</p>

  <div class="player-btns">
    <a href="map-3.html" class="player-btn">3 Players</a>
    <a href="map-4.html" class="player-btn">4 Players</a>
    <a href="map-5.html" class="player-btn">5 Players</a>
  </div>

  <a href="index.html" class="back-link">← Back to Scoreboard</a>

</body>
</html>
